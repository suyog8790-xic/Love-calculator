<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Love Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4b91,#ff6b6b,#ff9a9e,#ffc371);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Hearts */

.hearts{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
}

.hearts span{
position:absolute;
bottom:-50px;
font-size:24px;
animation:float linear infinite;
opacity:.7;
}

@keyframes float{

0%{
transform:translateY(0) scale(.8);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg) scale(1.4);
opacity:0;
}

}

/* Card */

.container{

width:min(92%,460px);
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
box-shadow:0 20px 50px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.25);
text-align:center;
color:white;
position:relative;
z-index:5;

}

h1{
font-size:2.3rem;
margin-bottom:8px;
}

.subtitle{
opacity:.9;
font-size:15px;
margin-bottom:25px;
}

.input{

width:100%;
padding:16px;
margin:10px 0;
border:none;
outline:none;
border-radius:14px;
font-size:16px;
background:rgba(255,255,255,.92);

}

button{

width:100%;
padding:16px;
margin-top:8px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,#ff2e63,#ff5f8f);
color:white;
transition:.35s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 12px 25px rgba(255,46,99,.4);

}

/* Result */

.result{
display:none;
margin-top:30px;
animation:fade .8s;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Progress Circle */

.circle{

--deg:0deg;

width:200px;
height:200px;
margin:auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;

background:
conic-gradient(
#ff2e63 0deg,
#ff2e63 var(--deg),
rgba(255,255,255,.25) var(--deg)
);

position:relative;

}

.circle::before{

content:"";
position:absolute;
width:155px;
height:155px;
background:white;
border-radius:50%;

}

.percent{

position:relative;
z-index:2;
font-size:42px;
font-weight:700;
color:#ff2e63;

}

.message{

margin-top:20px;
font-size:18px;
font-weight:600;
line-height:1.6;

}

.names{

margin-top:14px;
font-size:17px;
font-weight:500;
opacity:.95;

}

.footer{

margin-top:30px;
font-size:13px;
opacity:.8;

}

@media(max-width:500px){

.container{
padding:25px;
}

.circle{
width:170px;
height:170px;
}

.circle::before{
width:132px;
height:132px;
}

.percent{
font-size:35px;
}

}

</style>

</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>❤️ Love Calculator</h1>

<p class="subtitle">
Enter two names and reveal your beautiful compatibility.
</p>

<input
id="name1"
class="input"
placeholder="First Name">

<input
id="name2"
class="input"
placeholder="Second Name">

<button onclick="calculateLove()">
✨ Calculate Love
</button>

<div class="result" id="result">

<div class="circle" id="circle">

<div class="percent" id="percent">
0%
</div>

</div>

<div class="message" id="message"></div>

<div class="names" id="couple"></div>

</div>

<div class="footer">
Made with ❤️ for beautiful hearts
</div>

</div>

<script>

// Floating Hearts

const hearts=document.getElementById("hearts");

for(let i=0;i<40;i++){

let heart=document.createElement("span");

heart.innerHTML=Math.random()>.5?"❤":"💖";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(15+Math.random()*30)+"px";
heart.style.animationDuration=(5+Math.random()*8)+"s";
heart.style.animationDelay=Math.random()*6+"s";

hearts.appendChild(heart);

}

// Hash Function

function hash(str){

let h=0;

for(let i=0;i<str.length;i++){

h=((h<<5)-h)+str.charCodeAt(i);

h|=0;

}

return Math.abs(h);

}

function calculateLove(){

const a=document.getElementById("name1").value.trim();
const b=document.getElementById("name2").value.trim();

if(a===""||b===""){

alert("❤️ Please enter both names.");
return;

}

const combined=(a.toLowerCase()+b.toLowerCase())
.split("")
.sort()
.join("");

const seed=hash(combined);

// Love score between 70 and 100

const loveScore=70+(seed%31);

const deg=(loveScore/100)*360;

document
.getElementById("circle")
.style
.setProperty("--deg",deg+"deg");

// Animated Counter

let current=0;

const timer=setInterval(()=>{

current++;

document.getElementById("percent").innerHTML=current+"%";

if(current>=loveScore){

clearInterval(timer);

}

},18);

// Beautiful Messages

let msg="";

if(loveScore>=97)
msg="💫 True destiny! Perfect matching blueprints.";

else if(loveScore>=93)
msg="🎀 Incredibly strong chemistry & cute harmony!";

else if(loveScore>=88)
msg="🧁 Total sweethearts! You bring out their best smile.";

else if(loveScore>=83)
msg="🍭 Sparkly vibes! A truly wonderful connection.";

else if(loveScore>=76)
msg="🌻 Beautiful warmth. Filled with trust and gentle support.";

else if(loveScore>=70)
msg="🎈 Playful energy! Great joy and fun together.";

else
msg="🌱 Safe foundations with immense room to grow side-by-side.";

document.getElementById("message").innerHTML=msg;

document.getElementById("couple").innerHTML=
"✨ "+a+" ❤️ "+b+" ✨";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
